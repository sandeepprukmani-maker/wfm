version: "3.9"

services:
  # ── FlowForge Backend ────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.api
    container_name: flowforge-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - FLOWFORGE_SECRET_KEY=${FLOWFORGE_SECRET_KEY:-change-me-in-production}
      - FLOWFORGE_SALT=${FLOWFORGE_SALT:-flowforge-salt}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DATABASE_URL=sqlite:////data/flowforge.db
    volumes:
      - flowforge-data:/data
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx (serve frontend + proxy API) ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: flowforge-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  flowforge-data:
