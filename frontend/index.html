        <div style={{fontSize:10,textTransform:'uppercase',letterSpacing:'1.2px',color:'var(--t3)',fontFamily:'var(--mono)',marginBottom:8}}>{scope} scope ({grouped[scope].length})</div>
        {grouped[scope].length===0
          ? <div style={{padding:'12px 16px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,color:'var(--t3)',fontSize:13}}>No {scope} variables.</div>
          : <div className="tbl-card">
              <table>
                <thead><tr><th>Key</th><th>Value</th><th>Type</th><th>Workflow</th><th>Updated</th><th></th></tr></thead>
                <tbody>
                  {grouped[scope].map(v=>(
                    <tr key={v.id}>
                      <td><span className="mono" style={{color:'var(--accent)'}}>${v.key}</span></td>
                      <td><span className="mono" style={{color:'var(--t1)',maxWidth:240,display:'inline-block',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{typeof v.value==='object'?JSON.stringify(v.value):String(v.value??'')}</span></td>
                      <td><span style={{fontSize:11,color:typeColor[v.value_type]||'var(--t2)',fontFamily:'var(--mono)'}}>{v.value_type}</span></td>
                      <td><span style={{fontSize:11,color:'var(--t3)'}}>{scope==='workflow'?(workflows.find(w=>w.id===v.workflow_id)?.name||v.workflow_id||'—'):'global'}</span></td>
                      <td><span className="mono" style={{fontSize:11,color:'var(--t3)'}}>{new Date(v.updated_at).toLocaleDateString()}</span></td>
                      <td><div style={{display:'flex',gap:5}}>
                        <button className="btn btn-ghost btn-sm" onClick={()=>openEdit(v)}>✏️</button>
                        <button className="btn btn-danger btn-sm" onClick={()=>del(v.id)}>✕</button>
                      </div></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
        }
      </div>
    ))}
    {showModal&&(
      <div className="overlay" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
        <div className="modal modal-sm">
          <div className="mhdr">
            <div className="mtitle">{editVar?`Edit $${editVar.key}`:'New Variable'}</div>
            <button className="mclose" onClick={()=>setShowModal(false)}>×</button>
          </div>
          <div className="mbody">
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {!editVar&&<>
                <div className="prop-field">
                  <div className="prop-lbl">Key</div>
                  <input className="inp" placeholder="my_variable" value={form.key} onChange={e=>setForm(f=>({...f,key:e.target.value}))}/>
                  <div className="hint">Reference as {'{{$var.my_variable}}'} in node props</div>
                </div>
                <div className="prop-field">
                  <div className="prop-lbl">Scope</div>
                  <select className="sel" value={form.scope} onChange={e=>setForm(f=>({...f,scope:e.target.value}))}>
                    <option value="workflow">Workflow (scoped to one workflow)</option>
                    <option value="global">Global (all workflows)</option>
                  </select>
                </div>
                {form.scope==='workflow'&&<div className="prop-field">
                  <div className="prop-lbl">Workflow</div>
                  <select className="sel" value={form.workflow_id} onChange={e=>setForm(f=>({...f,workflow_id:e.target.value}))}>
                    <option value="">— Select workflow —</option>
                    {workflows.map(w=><option key={w.id} value={w.id}>{w.name}</option>)}
                  </select>
                </div>}
              </>}
              <div className="prop-field">
                <div className="prop-lbl">Value</div>
                <textarea className="ta" placeholder='e.g. 42  or  "hello"  or  {"key": "val"}' value={form.value} onChange={e=>setForm(f=>({...f,value:e.target.value}))}/>
              </div>
              <div className="prop-field">
                <div className="prop-lbl">Type</div>
                <select className="sel" value={form.value_type} onChange={e=>setForm(f=>({...f,value_type:e.target.value}))}>
                  {['auto','string','number','boolean','json'].map(t=><option key={t}>{t}</option>)}
                </select>
              </div>
              <div className="prop-field">
                <div className="prop-lbl">Description (optional)</div>
                <input className="inp" placeholder="What this variable is for…" value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))}/>
              </div>
            </div>
          </div>
          <div className="mfoot">
            <button className="btn btn-ghost" onClick={()=>setShowModal(false)}>Cancel</button>
            <button className="btn btn-primary" onClick={save}>Save Variable</button>
          </div>
        </div>
      </div>
    )}
  </div>;
}

/* ── Workflow Settings Modal ── */
function WorkflowSettingsModal({wf,api,addToast,onClose,onSave,workflows}){
  const [errorWfId,setErrorWfId]=useState((wf.settings||{}).error_workflow_id||'');
  const [tz,setTz]=useState((wf.settings||{}).timezone||'UTC');
  const [saving,setSaving]=useState(false);

  const save=async()=>{
    setSaving(true);
    try{
      await api(`/workflows/${wf.id}`,{method:'PUT',body:JSON.stringify({
        settings:{...wf.settings,error_workflow_id:errorWfId||null,timezone:tz},
      })});
      addToast('success','Workflow settings saved');
      onSave({...wf,settings:{...wf.settings,error_workflow_id:errorWfId||null,timezone:tz}});
      onClose();
    }catch(e){addToast('error',e.message);}
    finally{setSaving(false);}
  };

  return <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal modal-sm">
      <div className="mhdr">
        <div className="mtitle">⚙️ Workflow Settings</div>
        <button className="mclose" onClick={onClose}>×</button>
      </div>
      <div className="mbody">
        <div className="prop-grp">
          <div className="prop-grp-lbl">Error Handling</div>
          <div className="prop-field">
            <div className="prop-lbl">Error Workflow</div>
            <select className="sel" value={errorWfId} onChange={e=>setErrorWfId(e.target.value)}>
              <option value="">— None (fail silently) —</option>
              {workflows.filter(w=>w.id!==wf.id).map(w=><option key={w.id} value={w.id}>{w.name}</option>)}
            </select>
            <div className="hint">When this workflow fails, automatically trigger the selected error-handler workflow with failure context as trigger_data.</div>
          </div>
        </div>
        <div className="prop-grp">
          <div className="prop-grp-lbl">Scheduling</div>
          <div className="prop-field">
            <div className="prop-lbl">Timezone</div>
            <input className="inp" value={tz} onChange={e=>setTz(e.target.value)} placeholder="UTC"/>
          </div>
        </div>
        {errorWfId&&<div style={{background:'rgba(0,214,143,.07)',border:'1px solid rgba(0,214,143,.2)',borderRadius:7,padding:'9px 13px',fontSize:12,color:'var(--green)',marginTop:4}}>
          ✅ On failure, FlowForge will fire <strong>{workflows.find(w=>w.id===errorWfId)?.name}</strong> with error context as trigger payload.
        </div>}
      </div>
      <div className="mfoot">
        <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
        <button className="btn btn-primary" onClick={save} disabled={saving}>{saving?'Saving…':'Save Settings'}</button>
      </div>
    </div>
  </div>;
}

/* ── Cron Builder ── */
function CronBuilder({value, onChange}){
  const presets=[
    {l:'Every 15 min', v:'*/15 * * * *'},
    {l:'Hourly',       v:'0 * * * *'},
    {l:'Daily 6am',    v:'0 6 * * *'},
    {l:'Daily midnight',v:'0 0 * * *'},
    {l:'Weekly Mon 6am',v:'0 6 * * 1'},
    {l:'Monthly 1st',  v:'0 8 1 * *'},
    {l:'Manual',       v:'manual'},
  ];
  return <div style={{display:'flex',flexDirection:'column',gap:6}}>
    <input className="inp" value={value||''} onChange={e=>onChange(e.target.value)} placeholder="*/5 * * * *"/>
    <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:2}}>
      {presets.map(p=>(
        <button key={p.v} className="btn btn-ghost btn-sm"
          style={{fontSize:10,padding:'2px 7px',background:(value===p.v)?'rgba(0,229,255,.15)':'',border:(value===p.v)?'1px solid var(--accent)':''}}
          onClick={()=>onChange(p.v)}>{p.l}</button>
      ))}
    </div>
    {value&&value!=='manual'&&<div className="hint">🕐 Next: {(() => { try { return 'Scheduled (server-side cron)'; } catch(e) { return 'Invalid cron'; } })()}</div>}
  </div>;
}

/* ── Metrics Page ── */
function MetricsPage({api,addToast,workflows}){
  const [summary,setSummary]=useState(null);
  const [trend,setTrend]=useState([]);
  const [nodes,setNodes]=useState({slowest:[],most_failed:[],by_type:[]});
  const [wfList,setWfList]=useState([]);
  const [selWf,setSelWf]=useState('');
  const [wfDetail,setWfDetail]=useState(null);
  const [days,setDays]=useState(30);
  const [loading,setLoading]=useState(true);

  const load=async(d=days)=>{
    setLoading(true);
    try{
      const [s,t,n,w]=await Promise.all([
        api(`/metrics/summary?days=${d}`),
        api(`/metrics/trend?days=${d}`),
        api(`/metrics/nodes?days=${d}`),
        api(`/metrics/workflows?days=${d}`),
      ]);
      setSummary(s);
      setTrend(t.trend||[]);
      setNodes(n);
      setWfList(w.workflows||[]);
    }catch(err){addToast('error',`Metrics load failed: ${err.message}`);}
    finally{setLoading(false);}
  };

  const loadWfDetail=async(id)=>{
    if(!id){setWfDetail(null);return;}
    try{const m=await api(`/metrics/workflows/${id}?days=${days}`);setWfDetail(m);}
    catch(e){addToast('error',e.message);}
  };

  useEffect(()=>{load();},[]);
  useEffect(()=>{if(selWf)loadWfDetail(selWf);else setWfDetail(null);},[selWf,days]);

  const statCard=(label,value,sub,color='var(--accent)')=>(
    <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'14px 18px',minWidth:120,flex:1}}>
      <div style={{fontSize:10,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'1px',marginBottom:6}}>{label}</div>
      <div style={{fontSize:24,fontWeight:800,color,lineHeight:1}}>{value??'—'}</div>
      {sub&&<div style={{fontSize:11,color:'var(--t3)',marginTop:4}}>{sub}</div>}
    </div>
  );

  const MiniChart=({data,field,color})=>{
    const max=Math.max(...data.map(d=>d[field]||0),1);
    return <div style={{display:'flex',alignItems:'flex-end',gap:2,height:48}}>
      {data.map((d,i)=>(
        <div key={i} title={`${d.date}: ${d[field]}`}
          style={{flex:1,minWidth:2,height:`${Math.round((d[field]||0)/max*44)+2}px`,
            background:color||'var(--accent)',borderRadius:'2px 2px 0 0',opacity:.85}}/>
      ))}
    </div>;
  };

  if(loading&&!summary) return <div className="loading">⏳ Loading metrics…</div>;

  const sr=summary?.success_rate_pct??0;
  const srColor=sr>=90?'var(--green)':sr>=70?'#ffb020':'var(--red)';

  return <div className="page-content">
    {/* Header + period selector */}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
      <h2 style={{fontSize:18,fontWeight:800}}>Execution Metrics</h2>
      <div style={{display:'flex',gap:6}}>
        {[7,14,30,90].map(d=>(
          <button key={d} className={`btn ${days===d?'btn-primary':'btn-ghost'} btn-sm`}
            onClick={()=>{setDays(d);load(d);}}>{d}d</button>
        ))}
      </div>
    </div>

    {summary&&<>
      {/* KPI cards */}
      <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:18}}>
        {statCard('Total Runs', summary.total_runs, `Last ${days} days`)}
        {statCard('Success Rate', summary.success_rate_pct!=null?`${summary.success_rate_pct}%`:'—',
          `${summary.success_runs} ok / ${summary.failed_runs} failed`, srColor)}
        {statCard('Avg Duration', summary.avg_duration_s!=null?`${summary.avg_duration_s}s`:'—',
          summary.p95_duration_s?`p95: ${summary.p95_duration_s}s`:null)}
        {statCard('Workflows', summary.total_workflows, 'active')}
        {statCard('Scheduled', summary.scheduled_runs, `Manual: ${summary.manual_runs}`, 'var(--purple)')}
      </div>

      {/* Trend charts */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:18}}>
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'14px 18px'}}>
          <div style={{fontSize:12,fontWeight:700,marginBottom:10,color:'var(--t2)'}}>✅ Successful runs / day</div>
          <MiniChart data={trend} field="success" color="var(--green)"/>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:4,fontSize:10,color:'var(--t3)'}}>
            <span>{trend[0]?.date}</span><span>{trend[trend.length-1]?.date}</span>
          </div>
        </div>
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'14px 18px'}}>
          <div style={{fontSize:12,fontWeight:700,marginBottom:10,color:'var(--t2)'}}>❌ Failed runs / day</div>
          <MiniChart data={trend} field="failed" color="var(--red)"/>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:4,fontSize:10,color:'var(--t3)'}}>
            <span>{trend[0]?.date}</span><span>{trend[trend.length-1]?.date}</span>
          </div>
        </div>
      </div>

      {/* Bottleneck panels */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:18}}>
        {/* Slowest nodes */}
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'14px 18px'}}>
          <div style={{fontSize:12,fontWeight:700,marginBottom:10,color:'var(--t2)'}}>🐢 Slowest Nodes (avg)</div>
          {nodes.slowest.length===0
            ? <div style={{color:'var(--t3)',fontSize:13}}>No execution data yet.</div>
            : nodes.slowest.slice(0,8).map(n=>{
                const maxAvg=Math.max(...nodes.slowest.map(x=>x.avg_duration_s||0),1);
                return <div key={n.node_key} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:11,color:'var(--t1)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{n.node_title}</div>
                    <div style={{display:'flex',alignItems:'center',gap:5,marginTop:2}}>
                      <span style={{fontSize:9,fontFamily:'var(--mono)',color:'var(--accent)',minWidth:60}}>{n.node_type}</span>
                      <div style={{flex:1,height:4,background:'var(--border)',borderRadius:2}}>
                        <div style={{width:`${Math.round((n.avg_duration_s||0)/maxAvg*100)}%`,height:'100%',background:'var(--purple)',borderRadius:2}}/>
                      </div>
                    </div>
                  </div>
                  <span style={{fontSize:11,color:'var(--t2)',fontFamily:'var(--mono)',marginLeft:10,whiteSpace:'nowrap'}}>{n.avg_duration_s}s</span>
                </div>;
              })
          }
        </div>
        {/* Most failed nodes */}
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'14px 18px'}}>
          <div style={{fontSize:12,fontWeight:700,marginBottom:10,color:'var(--t2)'}}>🔴 Most Failed Nodes</div>
          {nodes.most_failed.length===0
            ? <div style={{color:'var(--t3)',fontSize:13}}>No failures 🎉</div>
            : nodes.most_failed.slice(0,8).map(n=>(
              <div key={n.node_key} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:11,color:'var(--t1)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{n.node_title}</div>
                  <span style={{fontSize:9,fontFamily:'var(--mono)',color:'var(--accent)'}}>{n.node_type}</span>
                </div>
                <div style={{textAlign:'right',marginLeft:10}}>
                  <div style={{fontSize:12,fontWeight:700,color:'var(--red)'}}>{n.failed}×</div>
                  <div style={{fontSize:9,color:'var(--t3)'}}>{n.failure_rate_pct}% fail</div>
                </div>
              </div>
            ))
          }
        </div>
      </div>

      {/* Per-workflow table */}
      {wfList.length>0&&<div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'14px 18px',marginBottom:18}}>
        <div style={{fontSize:12,fontWeight:700,marginBottom:12,color:'var(--t2)'}}>📋 All Workflows</div>
        <div className="tbl-card">
          <table>
            <thead><tr><th>Workflow</th><th>Runs</th><th>Success %</th><th>Avg</th><th>Last Run</th><th>Status</th></tr></thead>
            <tbody>
              {wfList.map(w=>{
                const src=w.success_rate_pct??0;
                const sc=src>=90?'var(--green)':src>=70?'#ffb020':'var(--red)';
                const statusColor={success:'var(--green)',failed:'var(--red)',running:'var(--accent)',pending:'var(--t3)'}[w.last_run_status]||'var(--t3)';
                return <tr key={w.workflow_id} style={{cursor:'pointer'}} onClick={()=>setSelWf(w.workflow_id===selWf?'':w.workflow_id)}>
                  <td style={{fontWeight:selWf===w.workflow_id?700:400}}>{w.workflow_name}</td>
                  <td className="mono">{w.total_runs}</td>
                  <td><span style={{color:sc,fontWeight:700}}>{w.success_rate_pct!=null?`${w.success_rate_pct}%`:'—'}</span></td>
                  <td className="mono">{w.avg_duration_s!=null?`${w.avg_duration_s}s`:'—'}</td>
                  <td className="mono" style={{fontSize:11,color:'var(--t3)'}}>{w.last_run_at?new Date(w.last_run_at).toLocaleDateString():'never'}</td>
                  <td><span style={{fontSize:10,color:statusColor,fontFamily:'var(--mono)'}}>{w.last_run_status||'—'}</span></td>
                </tr>;
              })}
            </tbody>
          </table>
        </div>
      </div>}
    </>}

    {/* Per-workflow drill-down */}
    <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'14px 18px'}}>
      <div style={{fontSize:12,fontWeight:700,marginBottom:12,color:'var(--t2)'}}>🔍 Workflow Drill-down</div>
      <select className="sel" style={{maxWidth:360,marginBottom:12}} value={selWf} onChange={e=>setSelWf(e.target.value)}>
        <option value="">— Click a row above or select —</option>
        {workflows.map(w=><option key={w.id} value={w.id}>{w.name}</option>)}
      </select>
      {wfDetail&&<>
        <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:14}}>
          {statCard('Runs',wfDetail.total_runs,`${days}d`)}
          {statCard('Success',wfDetail.success_rate_pct!=null?`${wfDetail.success_rate_pct}%`:'—','rate',
            (wfDetail.success_rate_pct??0)>=90?'var(--green)':(wfDetail.success_rate_pct??0)>=70?'#ffb020':'var(--red)')}
          {statCard('Avg',wfDetail.avg_duration_s!=null?`${wfDetail.avg_duration_s}s`:'—','duration')}
        </div>
        {wfDetail.node_stats?.length>0&&<>
          <div style={{fontSize:11,color:'var(--t3)',fontWeight:700,marginBottom:6}}>Node breakdown</div>
          <div className="tbl-card">
            <table>
              <thead><tr><th>Node</th><th>Type</th><th>Runs</th><th>Fail%</th><th>Avg</th><th>p95</th></tr></thead>
              <tbody>
                {wfDetail.node_stats.map(n=>(
                  <tr key={n.title}>
                    <td>{n.title}</td>
                    <td><span style={{fontSize:10,fontFamily:'var(--mono)',color:'var(--accent)'}}>{n.type}</span></td>
                    <td className="mono">{n.runs}</td>
                    <td><span style={{color:n.failure_pct>20?'var(--red)':n.failure_pct>0?'#ffb020':'var(--green)'}}>{n.failure_pct}%</span></td>
                    <td className="mono">{n.avg_duration_s!=null?`${n.avg_duration_s}s`:'—'}</td>
                    <td className="mono">{n.p95_duration_s!=null?`${n.p95_duration_s}s`:'—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>}
        {wfDetail.recent_runs?.length>0&&<>
          <div style={{fontSize:11,color:'var(--t3)',fontWeight:700,margin:'12px 0 6px'}}>Recent runs</div>
          <div style={{display:'flex',flexDirection:'column',gap:4}}>
            {wfDetail.recent_runs.map(r=>{
              const rc={success:'var(--green)',failed:'var(--red)',running:'var(--accent)',pending:'var(--t3)'}[r.status]||'var(--t3)';
              return <div key={r.id} style={{display:'flex',alignItems:'center',gap:12,padding:'6px 10px',background:'var(--surface2)',borderRadius:6,fontSize:12}}>
                <span style={{color:rc,fontWeight:700,minWidth:60}}>{r.status}</span>
                <span className="mono" style={{fontSize:10,color:'var(--t3)'}}>{r.id}</span>
                <span style={{color:'var(--t3)',fontSize:11}}>{r.triggered_by}</span>
                <span style={{marginLeft:'auto',fontFamily:'var(--mono)',fontSize:11}}>{r.duration_s!=null?`${r.duration_s}s`:''}</span>
                <span style={{color:'var(--t3)',fontSize:10}}>{r.started_at?new Date(r.started_at).toLocaleString():''}</span>
              </div>;
            })}
          </div>
        </>}
      </>}
    </div>
  </div>;
}

/* ── Templates Page ── */
function TemplatesPage({api,addToast,onOpenWorkflow,setPage}){
  const [templates,setTemplates]=useState([]);
  const [loading,setLoading]=useState(true);
  const [catFilter,setCatFilter]=useState('');
  const [cplFilter,setCplFilter]=useState('');
  const [search,setSearch]=useState('');
  const [cloning,setCloning]=useState(null);
  const [preview,setPreview]=useState(null);

  useEffect(()=>{
    fetch('/api/templates/').then(r=>r.json()).then(d=>{setTemplates(d.templates||[]);setLoading(false);}).catch(()=>setLoading(false));
  },[]);

  const clone=async(tplId,tplName)=>{
    setCloning(tplId);
    try{
      const d=await api(`/templates/${tplId}/clone`,{method:'POST',body:JSON.stringify({name:tplName})});
      addToast('success',`"${d.workflow_name}" cloned! Opening in editor…`);
      // Open in workflow editor
      if(onOpenWorkflow&&d.workflow_id){
        const wf=await api(`/workflows/${d.workflow_id}`);
        onOpenWorkflow(wf);
        setPage('workflow');
      }
    }catch(e){addToast('error',`Clone failed: ${e.message}`);}
    finally{setCloning(null);}
  };

  const cats=[...new Set(templates.map(t=>t.category))].sort();
  const cplx=['simple','medium','complex'];
  const cplxColor={simple:'var(--green)',medium:'#ffb020',complex:'var(--red)'};
  const catColor={
    'data-engineering':'var(--accent)',
    'data-quality':'var(--green)',
    'monitoring':'var(--purple)',
    'storage':'#ffb020',
    'integration':'var(--t2)',
    'reporting':'#4adeaa',
    'resilience':'var(--red)',
  };

  const filtered=templates.filter(t=>{
    if(catFilter&&t.category!==catFilter) return false;
    if(cplFilter&&t.complexity!==cplFilter) return false;
    if(search&&!t.name.toLowerCase().includes(search.toLowerCase())&&!t.description.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  if(loading) return <div className="loading">⏳ Loading templates…</div>;

  return <div className="page-content">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}}>
      <div>
        <h2 style={{fontSize:18,fontWeight:800}}>Workflow Templates</h2>
        <p style={{fontSize:13,color:'var(--t3)',marginTop:3}}>Production-ready workflows. Clone to editor and configure credentials.</p>
      </div>
    </div>
    <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
      <input className="filter-inp" placeholder="🔍 Search…" value={search} onChange={e=>setSearch(e.target.value)} style={{maxWidth:220}}/>
      <select className="sel" style={{maxWidth:180}} value={catFilter} onChange={e=>setCatFilter(e.target.value)}>
        <option value="">All categories</option>
        {cats.map(c=><option key={c}>{c}</option>)}
      </select>
      <select className="sel" style={{maxWidth:150}} value={cplFilter} onChange={e=>setCplFilter(e.target.value)}>
        <option value="">All complexity</option>
        {cplx.map(c=><option key={c}>{c}</option>)}
      </select>
      {(catFilter||cplFilter||search)&&<button className="btn btn-ghost btn-sm" onClick={()=>{setCatFilter('');setCplFilter('');setSearch('');}}>✕ Clear</button>}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:14}}>
      {filtered.map(t=>(
        <div key={t.id} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:'16px 18px',display:'flex',flexDirection:'column',gap:10}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div>
              <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{t.name}</div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                <span style={{fontSize:10,padding:'2px 7px',borderRadius:4,background:`${catColor[t.category]||'var(--accent)'}22`,color:catColor[t.category]||'var(--accent)',border:`1px solid ${catColor[t.category]||'var(--accent)'}44`}}>{t.category}</span>
                <span style={{fontSize:10,padding:'2px 7px',borderRadius:4,background:`${cplxColor[t.complexity]}22`,color:cplxColor[t.complexity]}}>{t.complexity}</span>
                <span style={{fontSize:10,color:'var(--t3)'}}>{t.node_count} nodes</span>
              </div>
            </div>
          </div>
          <div style={{fontSize:12,color:'var(--t2)',lineHeight:1.5}}>{t.description}</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
            {t.node_types.map(nt=><span key={nt} style={{fontSize:10,fontFamily:'var(--mono)',padding:'1px 6px',borderRadius:4,background:'rgba(255,255,255,.04)',border:'1px solid var(--border)',color:'var(--t3)'}}>{nt}</span>)}
          </div>
          <div style={{display:'flex',gap:7,marginTop:4}}>
            <button className="btn btn-ghost btn-sm" onClick={()=>setPreview(t)}>👁 Preview</button>
            <button className="btn btn-primary btn-sm" style={{flex:1}} disabled={cloning===t.id} onClick={()=>clone(t.id,t.name)}>
              {cloning===t.id?'Cloning…':'Use Template →'}
            </button>
          </div>
        </div>
      ))}
      {filtered.length===0&&<div style={{gridColumn:'1/-1',textAlign:'center',padding:40,color:'var(--t3)'}}>No templates match your filters.</div>}
    </div>

    {preview&&(
      <div className="overlay" onClick={e=>e.target===e.currentTarget&&setPreview(null)}>
        <div className="modal" style={{maxWidth:540}}>
          <div className="mhdr">
            <div className="mtitle">{preview.name}</div>
            <button className="mclose" onClick={()=>setPreview(null)}>×</button>
          </div>
          <div className="mbody">
            <p style={{fontSize:13,color:'var(--t2)',marginBottom:12}}>{preview.description}</p>
            <div style={{fontSize:11,fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'1px',marginBottom:8}}>Node Pipeline</div>
            <div style={{display:'flex',flexDirection:'column',gap:5}}>
              {(preview.dsl?.nodes||[]).map((n,i)=>{
                const cfg=NC[n.type]||NC.trigger;
                return <div key={n.id} style={{display:'flex',alignItems:'center',gap:10,padding:'7px 10px',background:'var(--surface2)',borderRadius:7,border:`1px solid ${cfg.bd}33`}}>
                  <span style={{fontSize:14}}>{cfg.icon}</span>
                  <div>
                    <div style={{fontSize:12,fontWeight:700}}>{n.title}</div>
                    <div style={{fontSize:10,color:'var(--t3)',fontFamily:'var(--mono)'}}>{n.type}</div>
                  </div>
                </div>;
              })}
            </div>
          </div>
          <div className="mfoot">
            <button className="btn btn-ghost" onClick={()=>setPreview(null)}>Close</button>
            <button className="btn btn-primary" disabled={cloning===preview.id} onClick={()=>{setPreview(null);clone(preview.id,preview.name);}}>
              {cloning===preview.id?'Cloning…':'Use This Template →'}
            </button>
          </div>
        </div>
      </div>
    )}
  </div>;
}

/* ── App Shell ── */
function App(){
  const [token,setToken]=useState(null);
  const [user,setUser]=useState(null);
  const [page,setPage]=useState('chat');
  const [currentWf,setCurrentWf]=useState(null);
  const [workflows,setWorkflows]=useState([]);
  const [toasts,setToasts]=useState([]);

  const addToast=useCallback((type,msg)=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,type,msg}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),4000);
  },[]);

  const api=token?makeApi(token):null;

  const onLogin=(tok,usr)=>{setToken(tok);setUser(usr);};

  const loadWorkflows=useCallback(async()=>{
    if(!api) return;
    try{const d=await api('/workflows');setWorkflows(d.workflows||[]);}
    catch(e){/* silent */}
  },[token]);

  useEffect(()=>{if(token) loadWorkflows();},[token]);

  const openWorkflow=(wf)=>{setCurrentWf(wf);setPage('workflow');};

  if(!token) return <LoginPage onLogin={onLogin}/>;

  const navItems=[
    {id:'chat',icon:'💬',label:'AI Chat'},
    {id:'workflow',icon:'⬡',label:'Workflow Editor'},
    {id:'history',icon:'📋',label:'Execution History'},
    {id:'metrics',icon:'📊',label:'Metrics'},
    {id:'templates',icon:'📦',label:'Templates'},
    {id:'variables',icon:'📌',label:'Variables'},
    {id:'credentials',icon:'🔐',label:'Credentials'},
  ];

  const topTitles={
    chat:'💬 AI Prompt → Workflow Generator',
    workflow:`⬡ ${currentWf?.name||'Workflow Editor'}`,
    history:'📋 Execution History',
    metrics:'📊 Execution Metrics',
    templates:'📦 Workflow Templates',
    variables:'📌 Workflow Variables',
    credentials:'🔐 Credential Vault',
  };

  const initials=(user?.email||'U').slice(0,2).toUpperCase();

  return <>
    <div className="accent-line"/>
    <div className="shell">
      <div className="sidebar">
        <div className="logo-wrap">
          <div className="logo-mark">FF</div>
          <div>
            <div className="logo-text">FlowForge</div>
            <div style={{fontSize:9,color:'var(--t3)',fontFamily:'var(--mono)'}}>v3.0 production</div>
          </div>
        </div>
        <div className="nav">
          <div className="nav-sec">Application</div>
          {navItems.map(n=>(
            <div key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
              <span className="nav-icon">{n.icon}</span><span>{n.label}</span>
            </div>
          ))}
          {workflows.length>0&&<>
            <div className="nav-sec" style={{marginTop:8}}>Saved Workflows</div>
            {workflows.map(w=>(
              <div key={w.id} className="nav-item" onClick={()=>openWorkflow(w)} style={{paddingLeft:14}}>
                <span className="nav-icon" style={{fontSize:11}}>⬡</span>
                <span style={{fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{w.name}</span>
              </div>
            ))}
          </>}
        </div>
        <div className="sidebar-bot">
          <div className="user-chip" onClick={()=>{if(confirm('Sign out?')){setToken(null);setUser(null);setWorkflows([]);}}}>
            <div className="user-av">{initials}</div>
            <div>
              <div className="user-name">{user?.email?.split('@')[0]||'User'}</div>
              <div className="user-role">click to logout</div>
            </div>
          </div>
        </div>
      </div>
      <div className="main">
        <div className="topbar">
          <span className="topbar-title">{topTitles[page]}</span>
          <div style={{display:'flex',gap:8}}>
            {page==='workflow'&&<>
              <button className="btn btn-success btn-sm" onClick={()=>addToast('info','Use toolbar to save')}>💾 Save</button>
              <button className="btn btn-primary btn-sm" onClick={()=>addToast('info','Use toolbar to execute')}>▶ Execute</button>
            </>}
            {page==='history'&&<button className="btn btn-ghost btn-sm" onClick={()=>setPage('history')}>🔄 Refresh</button>}
            <button className="btn btn-ghost btn-sm" onClick={()=>window.open('/api/health','_blank')}>⚙️ Health</button>
          </div>
        </div>
        <div className="page">
          {page==='chat'    &&<ChatPage api={api} addToast={addToast} onOpenWorkflow={openWorkflow}/>}
          {page==='workflow'&&<WorkflowPage api={api} initialWorkflow={currentWf} addToast={addToast} token={token} workflows={workflows}/>}
          {page==='history' &&<HistoryPage api={api} addToast={addToast} workflows={workflows}/>}
          {page==='metrics' &&<MetricsPage api={api} addToast={addToast} workflows={workflows}/>}
          {page==='templates'&&<TemplatesPage api={api} addToast={addToast} onOpenWorkflow={openWorkflow} setPage={setPage}/>}
          {page==='variables'&&<VariablesPage api={api} addToast={addToast} workflows={workflows}/>}
          {page==='credentials'&&<CredentialsPage api={api} addToast={addToast}/>}
        </div>
      </div>
    </div>
    <Toast toasts={toasts}/>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
